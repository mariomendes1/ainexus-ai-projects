version: "3.8"

services:
  # NexusGuard – Anomaly & Fraud Detection
  # Scikit-Learn (Isolation Forest) · ~500 MB RAM
  nexusguard:
    build: ./nexusguard
    container_name: nexusguard
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - nexusguard_models:/app/models
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # DeepInsight – Sentiment & Topic Analysis
  # PyTorch (DistilBERT) · ~2-3 GB RAM
  deepinsight:
    build: ./deepinsight
    container_name: deepinsight
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - deepinsight_models:/app/models
    environment:
      - SENTIMENT_MODEL=lxyuan/distilbert-base-multilingual-cased-sentiments-student
    deploy:
      resources:
        limits:
          memory: 2560M
        reservations:
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # VisionStock – Intelligent Inventory Prediction
  # Scikit-Learn / XGBoost · ~1 GB RAM
  visionstock:
    build: ./visionstock
    container_name: visionstock
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - visionstock_models:/app/models
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # RealState Agent Lab - 3 agents + tools orchestration
  # FastAPI + optional Ollama local model
  realstate:
    build: ./realstate
    container_name: realstate
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - ./realstate/.env.connector
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=granite3.1-dense:2b
      - GEOSPATIAL_PLUGIN_ENABLED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 896M
        reservations:
          memory: 384M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 7s
      retries: 3
      start_period: 20s

volumes:
  nexusguard_models:
  deepinsight_models:
  visionstock_models:
